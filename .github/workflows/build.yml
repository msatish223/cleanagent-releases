name: Build CleanAgent

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask psutil pyinstaller

      - name: Build Windows .exe
        run: |
          pyinstaller cleanagent.spec --clean --noconfirm

      - name: Test .exe exists
        run: |
          if (Test-Path "dist/CleanAgent.exe") {
            $size = (Get-Item "dist/CleanAgent.exe").Length / 1MB
            Write-Output "✅ CleanAgent.exe built successfully ($([math]::Round($size, 1)) MB)"
          } else {
            Write-Error "❌ Build failed — CleanAgent.exe not found"
            exit 1
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: CleanAgent-Windows
          path: dist/CleanAgent.exe
          retention-days: 90

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask psutil pyinstaller

      - name: Build Mac binary
        run: |
          pyinstaller cleanagent.spec --clean --noconfirm
          chmod +x dist/CleanAgent

      - name: Create .dmg
        run: |
          mkdir -p dmg-contents
          cp dist/CleanAgent dmg-contents/CleanAgent
          chmod +x dmg-contents/CleanAgent

          cat > dmg-contents/README.txt << 'EOF'
          CleanAgent v2.0

          To run:
          1. Drag CleanAgent to your Desktop or Applications folder
          2. Right-click → Open (first time only, to bypass Gatekeeper)
          3. Opens in your browser at http://127.0.0.1:5000

          Your data never leaves your computer.
          EOF

          hdiutil create -volname "CleanAgent" \
            -srcfolder dmg-contents \
            -ov -format UDZO \
            dist/CleanAgent.dmg

          SIZE=$(du -h dist/CleanAgent.dmg | cut -f1)
          echo "✅ CleanAgent.dmg created ($SIZE)"

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: CleanAgent-Mac
          path: dist/CleanAgent.dmg
          retention-days: 90

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: CleanAgent-Windows
          path: ./release

      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: CleanAgent-Mac
          path: ./release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./release/CleanAgent.exe
            ./release/CleanAgent.dmg
          generate_release_notes: true
          draft: false
          prerelease: false
