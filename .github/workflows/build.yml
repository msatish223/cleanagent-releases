name: Build CleanAgent
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask psutil pyinstaller
      - name: Build Windows .exe
        run: |
          pyinstaller cleanagent.spec --clean --noconfirm
      - name: Test .exe exists
        run: |
          if (Test-Path "dist/CleanAgent.exe") {
            $size = (Get-Item "dist/CleanAgent.exe").Length / 1MB
            Write-Output "CleanAgent.exe built successfully ($([math]::Round($size, 1)) MB)"
          } else {
            Write-Error "Build failed - CleanAgent.exe not found"
            exit 1
          }
      - name: Sign .exe with Azure Trusted Signing
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.SIGNING_ENDPOINT }}
          trusted-signing-account-name: satish
          certificate-profile-name: cleanagent-signing
          files-folder: ${{ github.workspace }}\dist
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
      - name: Verify signature
        run: |
          $sig = Get-AuthenticodeSignature "dist/CleanAgent.exe"
          Write-Output "Signature status: $($sig.Status)"
          Write-Output "Signer: $($sig.SignerCertificate.Subject)"
          if ($sig.Status -ne "Valid") {
            Write-Warning "Signature is not valid - check signing configuration"
          }
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: CleanAgent-Windows
          path: dist/CleanAgent.exe
          retention-days: 90
  # ═══════════════════════════════════════════════════════════════
  # CORRECTED MAC BUILD — fixes keychain setup for CI codesigning
  # ═══════════════════════════════════════════════════════════════
  build-mac:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python (x86_64 via Rosetta for Intel compatibility)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (x86_64)
        run: |
          arch -x86_64 pip install --upgrade pip
          arch -x86_64 pip install -r requirements.txt
          arch -x86_64 pip install pyinstaller

      - name: Create entitlements file
        run: |
          cat > entitlements.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.cs.allow-jit</key>
            <true/>
            <key>com.apple.security.cs.allow-unsigned-executable-memory</key>
            <true/>
            <key>com.apple.security.cs.disable-library-validation</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Build with PyInstaller
        run: |
          arch -x86_64 pyinstaller --name CleanAgent \
            --windowed \
            --onedir \
            --osx-bundle-identifier io.cleanagent.app \
            --add-data "templates:templates" \
            --add-data "static:static" \
            --clean \
            app.py

          echo "=== Full dist/ listing ==="
          ls -lhR dist/ | head -60
          echo "=== Checking for .app ==="
          test -d dist/CleanAgent.app && echo ".app EXISTS" || echo "WARNING: .app NOT FOUND"

      - name: Set up keychain and import certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # ── Define paths ──
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="ci-keychain-pwd-$(date +%s)"

          # Export for later steps
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

          # Decode the .p12 certificate
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12

          # ── Create and configure the keychain ──
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # FIX 1: Set as DEFAULT keychain (so codesign searches it)
          security default-keychain -s "$KEYCHAIN_PATH"

          # FIX 2: Add to the keychain SEARCH LIST (preserving existing keychains)
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Unlock the keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Prevent keychain from auto-locking during long builds
          security set-keychain-settings -t 3600 "$KEYCHAIN_PATH"

          # ── Import certificates ──
          security import $RUNNER_TEMP/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Download and install Apple Developer ID intermediate certificate
          curl -sL -o $RUNNER_TEMP/DeveloperIDG2CA.cer \
            https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
          security import $RUNNER_TEMP/DeveloperIDG2CA.cer \
            -k "$KEYCHAIN_PATH" \
            -T /usr/bin/codesign 2>/dev/null || true

          # FIX 3: Set partition list — ALLOWS CODESIGN TO ACCESS WITHOUT UI PROMPT
          # Without this, codesign silently fails to access the private key in CI
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # ── Verify setup ──
          echo "=== Default keychain ==="
          security default-keychain

          echo "=== Keychain search list ==="
          security list-keychains -d user

          echo "=== Available signing identities ==="
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          # Extract and save the identity name
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          if [ -z "$IDENTITY" ]; then
            echo "ERROR: No Developer ID Application identity found!"
            security find-identity -v "$KEYCHAIN_PATH"
            exit 1
          fi
          echo "CODESIGN_IDENTITY=$IDENTITY" >> $GITHUB_ENV
          echo "✅ Found identity: $IDENTITY"

      - name: Codesign the .app bundle
        run: |
          echo "Signing with: $CODESIGN_IDENTITY"

          # FIX 4: --keychain flag on ALL codesign commands
          # Without this, codesign may search the wrong keychain

          # Step A: Deep-sign ALL nested .so and .dylib files individually
          find dist/CleanAgent.app -type f \( -name "*.so" -o -name "*.dylib" \) | while read lib; do
            codesign --force --sign "$CODESIGN_IDENTITY" \
              --keychain "$KEYCHAIN_PATH" \
              --options runtime \
              --timestamp \
              "$lib" 2>&1 && echo "  ✅ $lib" || echo "  ⚠️ $lib (non-fatal)"
          done

          # Step B: Sign nested executables in MacOS/
          find dist/CleanAgent.app/Contents/MacOS -type f -perm +111 | while read exe; do
            echo "Signing executable: $exe"
            codesign --force --sign "$CODESIGN_IDENTITY" \
              --keychain "$KEYCHAIN_PATH" \
              --options runtime \
              --entitlements entitlements.plist \
              --timestamp \
              "$exe"
          done

          # Step C: Sign the entire .app bundle (outermost signature)
          codesign --force --deep --sign "$CODESIGN_IDENTITY" \
            --keychain "$KEYCHAIN_PATH" \
            --options runtime \
            --entitlements entitlements.plist \
            --timestamp \
            dist/CleanAgent.app

          # Verify
          echo "=== Signature verification ==="
          codesign -dv --verbose=4 dist/CleanAgent.app 2>&1
          echo "=== Strict verification ==="
          codesign --verify --strict --verbose=2 dist/CleanAgent.app 2>&1

      - name: Create .dmg from .app
        run: |
          mkdir -p dmg-contents

          if [ -d "dist/CleanAgent.app" ]; then
            echo "Found .app bundle, using it directly"
            rm -rf dmg-contents/*
            cp -R dist/CleanAgent.app dmg-contents/
            ln -s /Applications dmg-contents/Applications
          else
            echo "No .app found — creating .app wrapper from dist/CleanAgent/"
            mkdir -p dmg-contents/CleanAgent.app/Contents/MacOS
            mkdir -p dmg-contents/CleanAgent.app/Contents/Resources
            cp -R dist/CleanAgent/* dmg-contents/CleanAgent.app/Contents/MacOS/
            printf '%s\n' '<?xml version="1.0" encoding="UTF-8"?>' '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' '<plist version="1.0">' '<dict>' '  <key>CFBundleIdentifier</key>' '  <string>io.cleanagent.app</string>' '  <key>CFBundleName</key>' '  <string>CleanAgent</string>' '  <key>CFBundleExecutable</key>' '  <string>CleanAgent</string>' '  <key>CFBundleVersion</key>' '  <string>2.5</string>' '  <key>CFBundlePackageType</key>' '  <string>APPL</string>' '  <key>LSMinimumSystemVersion</key>' '  <string>10.13</string>' '</dict>' '</plist>' > dmg-contents/CleanAgent.app/Contents/Info.plist
            ln -s /Applications dmg-contents/Applications

            # Re-sign the manually created .app
            find dmg-contents/CleanAgent.app -type f \( -name "*.so" -o -name "*.dylib" \) | while read lib; do
              codesign --force --sign "$CODESIGN_IDENTITY" --keychain "$KEYCHAIN_PATH" --options runtime --timestamp "$lib" 2>&1 || true
            done
            find dmg-contents/CleanAgent.app/Contents/MacOS -type f -perm +111 | while read exe; do
              codesign --force --sign "$CODESIGN_IDENTITY" --keychain "$KEYCHAIN_PATH" --options runtime --entitlements entitlements.plist --timestamp "$exe"
            done
            codesign --force --deep --sign "$CODESIGN_IDENTITY" --keychain "$KEYCHAIN_PATH" --options runtime --entitlements entitlements.plist --timestamp dmg-contents/CleanAgent.app
          fi

          echo "=== DMG contents ==="
          ls -lhR dmg-contents/

          hdiutil create -volname "CleanAgent" \
            -srcfolder dmg-contents \
            -ov -format UDZO \
            "dist/CleanAgent.dmg"

          echo "DMG created:"
          ls -lh dist/CleanAgent.dmg

      - name: Codesign the DMG
        run: |
          codesign --force --sign "$CODESIGN_IDENTITY" \
            --keychain "$KEYCHAIN_PATH" \
            --timestamp \
            dist/CleanAgent.dmg

          echo "=== DMG signature ==="
          codesign -dv dist/CleanAgent.dmg 2>&1

      - name: Verify and fix DMG contents
        if: false
        run: |
          echo "=== Mounting DMG to inspect ==="
          hdiutil attach dist/CleanAgent.dmg -mountpoint /tmp/dmg-verify -nobrowse
          echo "=== DMG root contents ==="
          ls -lahR /tmp/dmg-verify/ | head -60
          
          echo "=== Checking signatures of all files ==="
          find /tmp/dmg-verify -type f | while read f; do
            echo "--- $f ---"
            codesign -dv "$f" 2>&1 || echo "  (not signed or not a Mach-O)"
          done
          
          hdiutil detach /tmp/dmg-verify
          
          echo "=== Recreating DMG with properly signed contents ==="
          rm -rf /tmp/dmg-rebuild
          mkdir -p /tmp/dmg-rebuild
          
          # Extract DMG contents
          hdiutil attach dist/CleanAgent.dmg -mountpoint /tmp/dmg-extract -nobrowse
          cp -R /tmp/dmg-extract/* /tmp/dmg-rebuild/ 2>/dev/null || true
          cp -R /tmp/dmg-extract/.* /tmp/dmg-rebuild/ 2>/dev/null || true
          hdiutil detach /tmp/dmg-extract
          
          # Sign EVERY Mach-O binary in the extracted contents
          find /tmp/dmg-rebuild -type f | while read f; do
            file "$f" | grep -q "Mach-O" && {
              echo "Signing: $f"
              codesign --force --sign "$CODESIGN_IDENTITY"                 --keychain "$KEYCHAIN_PATH"                 --options runtime                 --entitlements entitlements.plist                 --timestamp                 "$f"
            }
          done
          
          # Also sign any .app bundles
          find /tmp/dmg-rebuild -name "*.app" -type d | while read app; do
            echo "Signing app bundle: $app"
            codesign --force --deep --sign "$CODESIGN_IDENTITY"               --keychain "$KEYCHAIN_PATH"               --options runtime               --entitlements entitlements.plist               --timestamp               "$app"
          done
          
          # Rebuild the DMG
          rm dist/CleanAgent.dmg
          hdiutil create -volname "CleanAgent"             -srcfolder /tmp/dmg-rebuild             -ov -format UDZO             dist/CleanAgent.dmg
          
          # Sign the DMG itself
          codesign --force --sign "$CODESIGN_IDENTITY"             --keychain "$KEYCHAIN_PATH"             --timestamp             dist/CleanAgent.dmg
          
          # Final verification
          hdiutil attach dist/CleanAgent.dmg -mountpoint /tmp/dmg-final -nobrowse
          echo "=== Final DMG contents and signatures ==="
          find /tmp/dmg-final -type f | while read f; do
            file "$f" | grep -q "Mach-O" && {
              echo "--- $f ---"
              codesign -dv --verbose=2 "$f" 2>&1
            }
          done
          hdiutil detach /tmp/dmg-final

      - name: Notarize the DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Store credentials in a keychain profile (cleaner than inline)
          xcrun notarytool store-credentials "notarytool-profile" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD"

          echo "Submitting for notarization..."
          xcrun notarytool submit dist/CleanAgent.dmg \
            --keychain-profile "notarytool-profile" \
            --wait \
            --timeout 1800

          echo "Stapling notarization ticket..."
          xcrun stapler staple dist/CleanAgent.dmg

          echo "=== Final verification ==="
          spctl -a -vvv -t install dist/CleanAgent.dmg

      - name: Fetch notarization log on failure
        if: failure()
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool store-credentials "debug-profile" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD"

          echo "=== Recent submissions ==="
          xcrun notarytool history --keychain-profile "debug-profile" 2>&1 | head -30

          # Fetch log for latest submission
          SUBMISSION_ID=$(xcrun notarytool history --keychain-profile "debug-profile" 2>&1 | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
          if [ -n "$SUBMISSION_ID" ]; then
            echo "=== Notarization log for $SUBMISSION_ID ==="
            xcrun notarytool log "$SUBMISSION_ID" --keychain-profile "debug-profile" 2>&1
          fi

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: CleanAgent-Mac
          path: dist/CleanAgent.dmg
          retention-days: 90
  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: CleanAgent-Windows
          path: ./release
      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: CleanAgent-Mac
          path: ./release
      - name: List release files
        run: ls -lh ./release/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./release/CleanAgent.exe
            ./release/CleanAgent.dmg
          generate_release_notes: true
