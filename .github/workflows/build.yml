name: Build CleanAgent

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask psutil pyinstaller

      - name: Build Windows .exe
        run: |
          pyinstaller cleanagent.spec --clean --noconfirm

      - name: Test .exe exists
        run: |
          if (Test-Path "dist/CleanAgent.exe") {
            $size = (Get-Item "dist/CleanAgent.exe").Length / 1MB
            Write-Output "CleanAgent.exe built successfully ($([math]::Round($size, 1)) MB)"
          } else {
            Write-Error "Build failed - CleanAgent.exe not found"
            exit 1
          }

      - name: Sign .exe with Azure Trusted Signing
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.SIGNING_ENDPOINT }}
          trusted-signing-account-name: satish
          certificate-profile-name: cleanagent-signing
          files-folder: ${{ github.workspace }}\dist
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify signature
        run: |
          $sig = Get-AuthenticodeSignature "dist/CleanAgent.exe"
          Write-Output "Signature status: $($sig.Status)"
          Write-Output "Signer: $($sig.SignerCertificate.Subject)"
          if ($sig.Status -ne "Valid") {
            Write-Warning "Signature is not valid - check signing configuration"
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: CleanAgent-Windows
          path: dist/CleanAgent.exe
          retention-days: 90

  build-mac:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (x64 for Intel compatibility)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: x64

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask psutil pyinstaller

      - name: Build Mac binary
        run: |
          pyinstaller cleanagent.spec --clean --noconfirm
          chmod +x dist/CleanAgent
          echo "Binary architecture:"
          file dist/CleanAgent

      - name: Create .dmg
        run: |
          mkdir -p dmg-contents
          cp dist/CleanAgent dmg-contents/CleanAgent
          chmod +x dmg-contents/CleanAgent

          cat > dmg-contents/README.txt << 'EOF'
          CleanAgent v2.0

          To run:
          1. Drag CleanAgent to your Desktop or Applications folder
          2. Double-click to launch
          3. Your browser will open the dashboard automatically

          If macOS blocks the app:
          - Right-click CleanAgent > Open > Open
          EOF

          hdiutil create -volname "CleanAgent" \
            -srcfolder dmg-contents \
            -ov -format UDZO \
            "dist/CleanAgent.dmg"

          echo "DMG created:"
          ls -lh dist/CleanAgent.dmg

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: CleanAgent-Mac
          path: dist/CleanAgent.dmg
          retention-days: 90

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: CleanAgent-Windows
          path: ./release

      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: CleanAgent-Mac
          path: ./release

      - name: List release files
        run: ls -lh ./release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./release/CleanAgent.exe
            ./release/CleanAgent.dmg
          generate_release_notes: true
